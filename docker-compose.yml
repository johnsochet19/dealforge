services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: dealforge
      POSTGRES_DB: dealforge
    volumes: ["pgdata:/var/lib/postgresql/data"]
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:dealforge@db:5432/dealforge
    depends_on: [db]
    ports: ["8000:8000"]
volumes:
  pgdata:
